# Flamenco Manager
pangolin.manager.url=http://flamenco-manager:8080

# Storage
pangolin.storage.root=/shared

# Job limits
pangolin.frames.limit=3500
pangolin.frames.cap=100000
pangolin.download.max-files=5000
pangolin.project-name.max-length=100
pangolin.file.max-size-mb=512

# Features
pangolin.delete.enabled=${PANGOLIN_DELETE_ENABLED:false}

# Auth feature flag (set PANGOLIN_AUTH_ENABLED=true to enable OIDC login)
pangolin.auth.enabled=${PANGOLIN_AUTH_ENABLED:false}
# Admin group name from the OIDC 'groups' claim (Authentik group membership)
pangolin.auth.admin-group=${PANGOLIN_AUTH_ADMIN_GROUP:pangolin-admins}
# Admin role name (configurable via PANGOLIN_ADMIN_ROLE env var)
pangolin.auth.admin-role=${PANGOLIN_ADMIN_ROLE:admin}

# HTTP client timeouts (ms)
pangolin.http.connect-timeout=10000
pangolin.http.read-timeout=30000

# Spring / runtime
spring.threads.virtual.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Datasource
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:pangolin}
spring.datasource.username=${POSTGRES_USER:pangolin}
spring.datasource.password=${POSTGRES_PASSWORD:pangolin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OIDC / Authentik (only effective when pangolin.auth.enabled=true)
spring.security.oauth2.client.registration.authentik.client-id=${OIDC_CLIENT_ID:pangolin}
spring.security.oauth2.client.registration.authentik.client-secret=${OIDC_CLIENT_SECRET:}
spring.security.oauth2.client.registration.authentik.scope=openid,profile,email
spring.security.oauth2.client.registration.authentik.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.authentik.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.authentik.issuer-uri=${OIDC_ISSUER_URI:}

# Email / SMTP (optional — notifications are only sent when spring.mail.host is non-empty)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Pangolin notification settings
pangolin.mail.host=${SMTP_HOST:}
pangolin.mail.port=${SMTP_PORT:587}
pangolin.mail.username=${SMTP_USERNAME:}
pangolin.mail.password=${SMTP_PASSWORD:}
pangolin.mail.from=${SMTP_FROM:pangolin@localhost}
pangolin.webhook.url=${PANGOLIN_WEBHOOK_URL:}

# Quota / rate limiting
pangolin.quota.max-concurrent-jobs=${MAX_CONCURRENT_JOBS:10}
pangolin.quota.max-submissions-per-hour=${MAX_SUBMISSIONS_PER_HOUR:20}