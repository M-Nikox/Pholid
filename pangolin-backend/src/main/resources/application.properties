# Flamenco Manager
pangolin.manager.url=http://flamenco-manager:8080

# Storage
pangolin.storage.root=/shared

# Job limits
pangolin.frames.limit=3500
pangolin.frames.cap=100000
pangolin.download.max-files=5000
pangolin.project-name.max-length=100
pangolin.file.max-size-mb=512

# Features
pangolin.delete.enabled=${PANGOLIN_DELETE_ENABLED:false}

# HTTP client timeouts (ms)
pangolin.http.connect-timeout=10000
pangolin.http.read-timeout=30000

# Spring / runtime
spring.threads.virtual.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# Datasource
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:pangolin}
spring.datasource.username=${POSTGRES_USER:pangolin}
spring.datasource.password=${POSTGRES_PASSWORD:pangolin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration