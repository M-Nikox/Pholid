# Integration test profile: uses a real PostgreSQL instance managed by Testcontainers.
# The datasource URL is overridden at runtime via @DynamicPropertySource in each test class.

# Flamenco Manager — tests mock FlamencoClient, so any URL is fine
pangolin.manager.url=http://localhost:8080

# Storage — tests use a @TempDir or /tmp; overridden where needed
pangolin.storage.root=/tmp/pangolin-test

# Job limits (same as production defaults)
pangolin.frames.limit=3500
pangolin.frames.cap=100000
pangolin.download.max-files=5000
pangolin.project-name.max-length=100
pangolin.file.max-size-mb=512

# Delete enabled for tests that exercise the delete endpoint
pangolin.delete.enabled=true

# Auth disabled by default; individual tests override with @TestPropertySource
pangolin.auth.enabled=false
pangolin.auth.admin-group=pangolin-admins

# HTTP client timeouts (ms)
pangolin.http.connect-timeout=5000
pangolin.http.read-timeout=10000

# JPA — Flyway manages the schema; Hibernate must not modify it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Suppress OAuth2 auto-configurations — no Authentik server in test environment
spring.autoconfigure.exclude=\
  org.springframework.boot.security.oauth2.client.autoconfigure.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.security.oauth2.client.autoconfigure.servlet.OAuth2ClientWebSecurityAutoConfiguration
