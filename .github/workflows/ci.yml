name: CI

on:
  push:
    branches: [ master, main, v2-dev ]
  pull_request:
    branches: [ master, main, v2-dev ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: pangolin-backend
        run: mvn test -B

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pangolin-backend/target/surefire-reports/*.xml
