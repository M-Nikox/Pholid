services:
  # ============================================
  # TRAEFIK - Reverse Proxy / TLS Termination
  # ============================================
  # Routes HTTPS traffic to the backend and Grafana using Docker labels.
  # TLS modes:
  #   self-signed (default) – leave TRAEFIK_CERT_RESOLVER empty in .env;
  #     Traefik generates a built-in self-signed certificate automatically.
  #   letsencrypt – set TRAEFIK_CERT_RESOLVER=letsencrypt and ACME_EMAIL
  #     in .env; Traefik uses ACME (HTTP-01 challenge on port 80).
  traefik:
    image: traefik:v3.4.1
    container_name: pangolin-traefik
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP (redirected to HTTPS)
      - "443:443" # HTTPS
    environment:
      # Toggle the Traefik dashboard (disabled by default)
      - TRAEFIK_API_DASHBOARD=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - TRAEFIK_API_INSECURE=${TRAEFIK_DASHBOARD_ENABLED:-false}
      # Let's Encrypt ACME email (only used when TRAEFIK_CERT_RESOLVER=letsencrypt)
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only Docker socket for service discovery
      - ./traefik/traefik.yml:/traefik.yml:ro        # Static Traefik configuration
      - letsencrypt:/letsencrypt                     # Persisted TLS certificates / ACME state
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=proxy"

  # ============================================
  # FLAMENCO MANAGER - Render Job Orchestration
  # ============================================
  flamenco-manager:
    build:
      context: ./flamenco/manager
      dockerfile: Dockerfile
    container_name: pangolin-flamenco-manager
    hostname: flamenco-manager
    restart: unless-stopped
    # Internal port only - accessed through backend API, I wouldn't touch this unless necessary
    expose:
      - "8080"
    ports:
      - "${MANAGER_PORT}:8080"
    volumes:
      - flamenco-shared:/shared
      - ./flamenco/manager/flamenco-manager.yaml:/flamenco-3.8.2-linux-amd64/flamenco-manager.yaml:ro
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v3/configuration"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=flamenco-manager"

  # ============================================
  # FLAMENCO WORKERS - Blender Render Execution
  # ============================================
  flamenco-worker:
    build:
      context: ./flamenco/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      flamenco-manager:
        condition: service_healthy
    networks:
      - pangolin-network
    environment:
      - FLAMENCO_MANAGER_URL=http://flamenco-manager:8080
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      # WSL2: /usr/lib/wsl is mounted read-only so the entrypoint can detect
      # the environment and configure OptiX library paths automatically.
      # On native Linux this mount is an empty directory and has no effect.
    runtime: nvidia # NVIDIA runtime exposes GPUs to the container
    volumes:
      - flamenco-shared:/shared
      - /usr/lib/wsl:/usr/lib/wsl:ro # Allow access to WSL2 required NVIDIA OptiX libraries (read-only)
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: ${WORKER_CPU_LIMIT:-4.0}
          memory: ${WORKER_MEM_LIMIT:-8G}
        reservations:
          cpus: ${WORKER_CPU_RESERVE:-2.0}
          memory: ${WORKER_MEM_RESERVE:-4G}
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    labels:
      - "com.pangolin.service=flamenco-worker"

  # ============================================
  # POSTGRES - Persistent Database
  # ============================================
  postgres:
    image: postgres:17
    container_name: pangolin-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-pangolin}
      - POSTGRES_USER=${POSTGRES_USER:-pangolin}
      # Password is read from the Docker secret file (required – create secrets/postgres_password.txt first).
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pangolin} -d ${POSTGRES_DB:-pangolin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.pangolin.service=database"

  # ============================================
  # PANGOLIN BACKEND - Submission API
  # ============================================
  # Exposed via Traefik on https://${PANGOLIN_DOMAIN}
  pangolin-backend:
    build:
      context: ./pangolin-backend
      dockerfile: Dockerfile
    container_name: pangolin-backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - flamenco-shared:/shared
    networks:
      - pangolin-network
    environment:
      - FLAMENCO_MANAGER_URL=http://flamenco-manager:8080
      - STORAGE_ROOT=/shared
      - PANGOLIN_DELETE_ENABLED=${ENABLE_DELETE:-false} # Don't forget to edit this in the .env, it's set to false by default
      - POSTGRES_DB=${POSTGRES_DB:-pangolin}
      - POSTGRES_USER=${POSTGRES_USER:-pangolin}
      # DB password is read from the Docker secret file by SecretsEnvironmentPostProcessor.
      # If the secret file is absent, Spring falls back to ${POSTGRES_PASSWORD:pangolin}
      # from application.properties (useful when running the backend outside of Docker).
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    depends_on:
      flamenco-manager:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "com.pangolin.service=backend"
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.pangolin.rule=Host(`${PANGOLIN_DOMAIN:-pangolin.localhost}`)"
      - "traefik.http.routers.pangolin.entrypoints=websecure"
      - "traefik.http.routers.pangolin.tls=true"
      - "traefik.http.routers.pangolin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}"
      - "traefik.http.services.pangolin.loadbalancer.server.port=8080"

  # ============================================
  # PROMETHEUS - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: pangolin-prometheus
    restart: unless-stopped
    ports:                        # Feel free to remove the ports from Prometheus if you don't need them
      - "${PROMETHEUS_PORT}:9090" # Grafana can handle PromQL testing and offers a PromQL editor as well
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"

  # ============================================
  # GRAFANA - Visualization & Dashboards
  # ============================================
  # Exposed via Traefik on https://${GRAFANA_DOMAIN}
  grafana:
    image: grafana/grafana:12.3.4
    container_name: pangolin-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      # Admin password is read from the Docker secret file (required – create secrets/grafana_admin_password.txt first).
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE}
      - GF_SECURITY_ALLOW_EMBEDDING=${GF_SECURITY_ALLOW_EMBEDDING}
    secrets:
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      
    networks:
      - pangolin-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:-grafana.localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # ============================================
  # cADVISOR - Container Metrics
  # ============================================
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: pangolin-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - pangolin-network
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
    labels:
      - "com.pangolin.service=monitoring"

  # ============================================
  # FLAMENCO EXPORTER - Custom Prometheus Exporter
  # ============================================
  flamenco-exporter:
    build:
      context: ./monitoring/flamenco-exporter
      dockerfile: Dockerfile
    container_name: pangolin-flamenco-exporter
    restart: unless-stopped
    expose:
      - "9090"
    environment:
      - FLAMENCO_API_URL=http://flamenco-manager:8080
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - EXPORTER_PORT=9090
      - SCRAPE_INTERVAL=${EXPORTER_SCRAPE_INTERVAL:-15}
      - WORKER_SCRAPE_INTERVAL=${EXPORTER_WORKER_SCRAPE_INTERVAL:-15}
      - TASK_SCRAPE_INTERVAL=${EXPORTER_TASK_SCRAPE_INTERVAL:-60}
      - TASK_SAMPLE_SIZE_MIN=${EXPORTER_TASK_SAMPLE_MIN:-3}
      - TASK_SAMPLE_SIZE_MAX=${EXPORTER_TASK_SAMPLE_MAX:-5}
      - MAX_JOB_COUNT_THRESHOLD=${EXPORTER_MAX_JOB_THRESHOLD:-100}
      - REQUEST_TIMEOUT=${EXPORTER_REQUEST_TIMEOUT:-10}
      - LOG_LEVEL=${EXPORTER_LOG_LEVEL:-INFO}
    networks:
      - pangolin-network
    depends_on:
      flamenco-manager:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"



  # ============================================
  # GPU EXPORTER - NVIDIA GPU Metrics
  # ============================================
  gpu-exporter:
    build:
      context: ./monitoring/gpu-exporter
      dockerfile: Dockerfile
    container_name: pangolin-gpu-exporter
    restart: unless-stopped
    runtime: nvidia
    expose:
      - "9091"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - EXPORTER_PORT=9091
      - SCRAPE_INTERVAL=${GPU_EXPORTER_SCRAPE_INTERVAL:-5}
      - LOG_LEVEL=${GPU_EXPORTER_LOG_LEVEL:-INFO}
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro
    networks:
      - pangolin-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"

# ============================================
# NETWORKS
# ============================================
networks:
  pangolin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# VOLUMES
# ============================================
volumes:
  # Shared storage for Flamenco Manager and Workers
  flamenco-shared:
    driver: local
  
  # Monitoring data
  prometheus-data:
  grafana-data:

  # Database data
  postgres-data:

  # TLS certificates and ACME state (Let's Encrypt)
  letsencrypt:

# ============================================
# SECRETS
# ============================================
# Secret files must be created before starting the stack.
# See secrets/README.md for instructions.
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
