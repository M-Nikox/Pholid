services:
  # ============================================
  # FLAMENCO MANAGER - Render Job Orchestration
  # ============================================
  flamenco-manager:
    build:
      context: ./flamenco/manager
      dockerfile: Dockerfile
    container_name: pangolin-flamenco-manager
    hostname: flamenco-manager
    restart: unless-stopped
    # Internal port only - accessed through backend API
    expose:
      - "8080"
    ports:
      - "${MANAGER_PORT}:8080"
    volumes:
      - flamenco-shared:/shared
      - ./flamenco/manager/flamenco-manager.yaml:/flamenco-3.8.2-linux-amd64/flamenco-manager.yaml:ro
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v3/configuration"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=flamenco-manager"

  # ============================================
  # FLAMENCO WORKERS - Blender Render Execution
  # ============================================
  flamenco-worker:
    build:
      context: ./flamenco/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      flamenco-manager:
        condition: service_healthy
    volumes:
      - flamenco-shared:/shared
    networks:
      - pangolin-network
    environment:
      - FLAMENCO_MANAGER_URL=http://flamenco-manager:8080
    deploy:
      replicas: 2  # Scale workers as needed
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    labels:
      - "com.pangolin.service=flamenco-worker"

  # ============================================
  # PANGOLIN BACKEND - Submission API
  # ============================================
  pangolin-backend:
    build:
      context: ./pangolin-backend
      dockerfile: Dockerfile
    container_name: pangolin-backend
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:8080"
    volumes:
      - flamenco-shared:/shared
    networks:
      - pangolin-network
    environment:
      - FLAMENCO_MANAGER_URL=http://flamenco-manager:8080
      - STORAGE_ROOT=/shared
      - PANGOLIN_DELETE_ENABLED=${ENABLE_DELETE:-false}
    depends_on:
      flamenco-manager:
        condition: service_healthy
    labels:
      - "com.pangolin.service=backend"

  # ============================================
  # PROMETHEUS - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v3.5.1
    container_name: pangolin-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - pangolin-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"

  # ============================================
  # GRAFANA - Visualization & Dashboards
  # ============================================
  grafana:
    image: grafana/grafana:12.3.2
    container_name: pangolin-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      
    networks:
      - pangolin-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"

  # ============================================
  # cADVISOR - Container Metrics
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: pangolin-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - pangolin-network
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
    labels:
      - "com.pangolin.service=monitoring"

  # ============================================
  # FLAMENCO EXPORTER - Custom Prometheus Exporter
  # ============================================
  flamenco-exporter:
    build:
      context: ./monitoring/flamenco-exporter
      dockerfile: Dockerfile
    container_name: pangolin-flamenco-exporter
    restart: unless-stopped
    expose:
      - "9090"
    environment:
      - FLAMENCO_API_URL=http://flamenco-manager:8080
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - EXPORTER_PORT=9090
      - SCRAPE_INTERVAL=15
      - WORKER_SCRAPE_INTERVAL=15
      - TASK_SCRAPE_INTERVAL=60
      - TASK_SAMPLE_SIZE_MIN=3
      - TASK_SAMPLE_SIZE_MAX=5
      - MAX_JOB_COUNT_THRESHOLD=100
      - REQUEST_TIMEOUT=10
      - LOG_LEVEL=INFO
    networks:
      - pangolin-network
    depends_on:
      flamenco-manager:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.pangolin.service=monitoring"



# ============================================
# NETWORKS
# ============================================
networks:
  pangolin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# VOLUMES
# ============================================
volumes:
  # Shared storage for Flamenco Manager and Workers
  flamenco-shared:
    driver: local
  
  # Monitoring data
  prometheus-data:
  grafana-data:
