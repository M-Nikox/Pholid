# =============================================================================
# Pholid core
# =============================================================================
pholid.manager.url=${FLAMENCO_MANAGER_URL:http://flamenco-manager:8080}
pholid.storage.root=${STORAGE_ROOT:/shared}
pholid.userdata.root=${USERDATA_ROOT:/userdata}
pholid.delete.enabled=${PHOLID_DELETE_ENABLED:false}

pholid.frames.limit=10000
pholid.frames.cap=100000
pholid.download.max-files=50
pholid.project-name.max-length=64
pholid.file.max-size-mb=512
pholid.zip.max-uncompressed-mb=2048
pholid.zip.max-entries=10000

pholid.http.connect-timeout=5000
pholid.http.read-timeout=30000

# =============================================================================
# Auth
# =============================================================================
pholid.auth.enabled=${PHOLID_AUTH_ENABLED:false}
# Must match the Keycloak group name exactly (Client scopes -> groups mapper required)
pholid.auth.admin-group=pholid-admins
pholid.auth.admin-role=ADMIN
# Browser-facing Keycloak logout endpoint. Must be reachable by the user's browser.
# Dev: localhost:8180  |  Prod: https://auth.<domain>
pholid.auth.logout-uri=${OIDC_LOGOUT_URI:http://localhost:8180/realms/pholid/protocol/openid-connect/logout}

# =============================================================================
# Quota
# =============================================================================
pholid.quota.max-concurrent-jobs=5
pholid.quota.max-submissions-per-hour=20

# =============================================================================
# Webhook (optional)
# =============================================================================
pholid.webhook.url=${PHOLID_WEBHOOK_URL:}

# =============================================================================
# Database (Flyway + JPA)
# =============================================================================
spring.datasource.url=jdbc:postgresql://postgresql:5432/${POSTGRES_DB:pholid}
spring.datasource.username=${POSTGRES_USER:pholid}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway runs first and owns the schema, Hibernate just uses it
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================================================
# Keycloak OIDC (only active when pholid.auth.enabled=true)
#
# Manual endpoint configuration -- avoids issuer-uri OIDC discovery which fails
# in Docker Compose when internal (keycloak:8080) and external (localhost:8180)
# hostnames differ and Keycloak advertises the wrong issuer for backchannel calls.
#
# authorization-uri  -- browser-facing, must use the host the browser can reach
# token/jwk/userinfo -- server-to-server, use internal Docker service name
#
# For prod: set OIDC_AUTH_URI to https://auth.<domain>/realms/<realm>/protocol/openid-connect/auth
# and update token/jwk/userinfo URIs to https://auth.<domain> (or keep as keycloak:8080
# if Traefik routes that hostname internally).
# =============================================================================
spring.security.oauth2.client.registration.keycloak.client-id=${OIDC_CLIENT_ID:pholid}
spring.security.oauth2.client.registration.keycloak.client-secret=${OIDC_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.keycloak.authorization-uri=${OIDC_AUTH_URI:http://localhost:8180/realms/${KEYCLOAK_REALM:pholid}/protocol/openid-connect/auth}
spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/${KEYCLOAK_REALM:pholid}/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://keycloak:8080/realms/${KEYCLOAK_REALM:pholid}/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://keycloak:8080/realms/${KEYCLOAK_REALM:pholid}/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# =============================================================================
# Actuator
# =============================================================================
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# =============================================================================
# Multipart
# =============================================================================
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# =============================================================================
# Reverse proxy
# =============================================================================
# Tell Spring to trust X-Forwarded-* headers from Traefik so that
# redirect URIs (e.g. post_logout_redirect_uri) use the public domain/scheme
# rather than the internal container hostname and port.
server.forward-headers-strategy=framework