# Flamenco Manager
pholid.manager.url=http://flamenco-manager:8080

# Storage
pholid.storage.root=/shared

# Job limits
pholid.frames.limit=3500
pholid.frames.cap=100000
pholid.download.max-files=5000
pholid.project-name.max-length=100
pholid.file.max-size-mb=512

# Zip upload limits
pholid.zip.max-uncompressed-mb=2048
pholid.zip.max-entries=10000

# Features
pholid.delete.enabled=${PHOLID_DELETE_ENABLED:false}

# HTTP client timeouts (ms)
pholid.http.connect-timeout=10000
pholid.http.read-timeout=30000

# Spring / runtime
spring.threads.virtual.enabled=true
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
spring.servlet.multipart.file-size-threshold=2MB