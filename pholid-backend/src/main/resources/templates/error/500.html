<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Pholid Render Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/pholid.css">
    <link rel="icon" type="image/svg+xml" href="/svg/pholid.svg">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pholid-cream': '#FAF3E1',
                        'pholid-beige': '#F5E7C6',
                        'pholid-orange': '#FA8112',
                        'pholid-black': '#222222',
                        'pholid-purple-dark': '#1C1328',
                        'pholid-purple-deep': '#0F0916',
                    },
                    fontFamily: { 'outfit': ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="/js/theme.js" defer></script>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">
    <div class="max-w-lg w-full text-center space-y-8">
        <div class="flex justify-center">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center orange-glow" style="background:var(--pholid-orange)">
                <div class="pholid-logo-header w-10 h-10"></div>
            </div>
        </div>
        <div class="glass-card p-10 space-y-6">
            <div class="text-8xl font-black font-outfit opacity-90" style="color:var(--pholid-orange)">500</div>
            <div class="space-y-2">
                <h1 class="text-2xl font-black font-outfit uppercase tracking-tight">Internal Server Error</h1>
                <p class="opacity-50 text-sm">Something went wrong on our end. Please try again in a moment.</p>
                <p class="opacity-30 text-xs font-mono" th:if="${message}" th:text="${message}"></p>
            </div>
            <a href="/" class="inline-block w-full py-4 rounded-2xl font-black text-sm tracking-[0.1em] hover:brightness-110 active:scale-[0.98] transition-all shadow-xl uppercase" style="background:var(--pholid-orange);color:var(--accent-text)">
                Back to Render Manager
            </a>
        </div>
        <p class="text-[10px] font-black tracking-[0.3em] uppercase opacity-20">Pholid © 2026</p>
    </div>
</body>
</html>
